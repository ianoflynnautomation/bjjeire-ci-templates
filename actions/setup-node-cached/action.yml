name: 'Setup Node Cache'
description: 'Caches node_modules and optionally runs `npm ci`. Assumes Node is already present (container-first jobs — the container image is the source of truth for the toolchain version).'
inputs:
  working-directory:
    description: 'Directory containing package-lock.json; used for the cache key and `npm ci`.'
    required: false
    default: '.'
  install:
    description: 'When `true`, run `npm ci` in the working directory after the cache restore.'
    required: false
    default: 'false'
  cache-key-prefix:
    description: 'Prefix for the cache key (segment monorepo caches per package).'
    required: false
    default: 'node'
  package-manager:
    description: 'Package manager used when install=true (`npm` only today; reserved for yarn/pnpm).'
    required: false
    default: 'npm'
runs:
  using: "composite"
  steps:
    - name: Cache Node modules
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      id: node_cache
      with:
        path: ${{ inputs.working-directory }}/node_modules
        key: ${{ runner.os }}-${{ inputs.cache-key-prefix }}-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory), format('{0}/yarn.lock', inputs.working-directory), format('{0}/pnpm-lock.yaml', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.cache-key-prefix }}-

    - name: Install dependencies (npm ci)
      if: inputs.install == 'true' && inputs.package-manager == 'npm'
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        echo "::group::npm ci"
        npm ci
        echo "::endgroup::"
        echo "::notice title=Node cache::npm ci complete (cache-hit=${{ steps.node_cache.outputs.cache-hit }})"
