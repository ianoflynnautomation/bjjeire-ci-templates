name: 'Setup .NET Cache'
description: 'Caches NuGet packages. Assumes the .NET SDK is already present (container-first jobs — the container image is the source of truth for the toolchain version).'
inputs:
  cache-key-prefix:
    description: 'Prefix for the cache key, useful to segment caches per solution in a monorepo.'
    required: false
    default: 'nuget'
runs:
  using: "composite"
  steps:
    - name: Cache NuGet packages
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-${{ inputs.cache-key-prefix }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-${{ inputs.cache-key-prefix }}-
