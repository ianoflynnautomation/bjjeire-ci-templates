name: 'OpenAPI Breaking-Change Gate'
description: 'Compares a freshly generated OpenAPI spec against the last published contract in an OCI registry and fails on breaking changes. Skips only when no contract has been published yet; auth and network errors fail the gate rather than silently disabling it.'

inputs:
  current-spec:
    description: 'Path to the newly generated OpenAPI JSON to validate.'
    required: true
  image:
    description: 'OCI reference of the published contract without tag, e.g. ghcr.io/owner/my-api-contract. Lowercased internally; the registry host is derived from this reference.'
    required: true
  token:
    description: 'Token used to authenticate against the registry (needs packages: read for GHCR).'
    required: true
  user:
    description: 'Username for the registry login.'
    required: true
  baseline-tag:
    description: 'Tag of the published baseline contract to compare against.'
    required: false
    default: 'latest'
  treat-registry-denied-as-missing:
    description: >-
      When true (default), treat registry "denied" responses as first-publish
      skips — GHCR often returns denied for non-existent private packages.
      Set false to fail closed on any denied/unauthorized response.
    required: false
    default: 'true'
outputs:
  skipped:
    description: 'true when no published baseline exists yet and the gate was skipped (first publish).'
    value: ${{ steps.baseline.outputs.skip }}

runs:
  using: 'composite'
  steps:
    - uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d  # v2.0.1

    - name: Pull published baseline contract
      id: baseline
      shell: bash
      env:
        REGISTRY_TOKEN: ${{ inputs.token }}
        REGISTRY_USER: ${{ inputs.user }}
        IMAGE_INPUT: ${{ inputs.image }}
        BASELINE_TAG: ${{ inputs.baseline-tag }}
        TREAT_DENIED_AS_MISSING: ${{ inputs.treat-registry-denied-as-missing }}
      run: |
        set -euo pipefail
        echo "::add-mask::${REGISTRY_TOKEN}"
        IMAGE="${IMAGE_INPUT,,}"
        REGISTRY="${IMAGE%%/*}"
        REF="${IMAGE}:${BASELINE_TAG}"
        echo "::group::Probe ${REF}"
        printf '%s' "$REGISTRY_TOKEN" | oras login "$REGISTRY" -u "$REGISTRY_USER" --password-stdin
        set +e
        probe_err="$(oras manifest fetch "${REF}" 2>&1 >/dev/null)"
        probe_rc=$?
        set -e
        if [ "$probe_rc" -ne 0 ]; then
          # Missing package/tag = first publish. Auth and network must fail closed.
          if echo "$probe_err" | grep -qiE 'not found|name unknown|manifest unknown|repository does not exist'; then
            echo "::warning title=OpenAPI gate::No published contract at ${REF} yet; skipping breaking-change gate (first publish)"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::endgroup::"
            exit 0
          fi
          if echo "$probe_err" | grep -qiE 'denied|unauthorized|authentication|forbidden'; then
            if [ "$TREAT_DENIED_AS_MISSING" = "true" ]; then
              echo "::warning title=OpenAPI gate::Registry denied access to ${REF}; treating as first publish (treat-registry-denied-as-missing=true). Set that input to false to fail closed."
              echo "skip=true" >> "$GITHUB_OUTPUT"
              echo "::endgroup::"
              exit 0
            fi
            echo "::error title=OpenAPI gate::Registry denied access to ${REF} — refusing to continue ungated"
            printf '%s\n' "$probe_err"
            exit 1
          fi
          echo "::error title=OpenAPI gate::Could not probe ${REF} — refusing to continue ungated"
          printf '%s\n' "$probe_err"
          exit 1
        fi
        oras pull "${REF}" -o published-baseline
        spec="$(find published-baseline -type f -name '*.json' | head -n1)"
        if [ -z "$spec" ]; then
          echo "::error title=OpenAPI gate::Published baseline at ${REF} contained no JSON spec"
          exit 1
        fi
        echo "base_spec=${spec}" >> "$GITHUB_OUTPUT"
        echo "skip=false" >> "$GITHUB_OUTPUT"
        echo "::endgroup::"

    - name: Compare against published baseline
      if: steps.baseline.outputs.skip != 'true'
      uses: oasdiff/oasdiff-action/breaking@024f6c399f9a21ada1addb0f9a36ce1bfac995f1  # v0.1.6
      with:
        base: ${{ steps.baseline.outputs.base_spec }}
        revision: ${{ inputs.current-spec }}
        fail-on: ERR
        review: false

    - name: Report gate result
      if: steps.baseline.outputs.skip != 'true'
      shell: bash
      env:
        BASELINE_TAG: ${{ inputs.baseline-tag }}
      run: echo "::notice title=OpenAPI gate::No breaking changes vs published :${BASELINE_TAG}"
