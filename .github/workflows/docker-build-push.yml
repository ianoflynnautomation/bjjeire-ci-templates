name: Docker Build & Push (Reusable)

# Reusable golden path for container images: multi-arch buildx build with GHA
# cache, SBOM + provenance attestation, cosign keyless signing, and an
# optional Trivy scan whose SARIF lands in GitHub code scanning.
#
# Required caller permissions (superset of every job below — GitHub rejects
# the run at parse time if the caller grants less):
#   contents: read
#   packages: write
#   id-token: write
#   attestations: write
#   security-events: write   # only when scan: true
#
# No top-level concurrency here — put it on the caller only (a shared group
# between caller and callee self-deadlocks).

on:
  workflow_call:
    inputs:
      image-name:
        description: "Short image name, e.g. `my-api`. Combined with registry + lowercased repository owner."
        required: true
        type: string
      registry:
        description: "Container registry host."
        required: false
        type: string
        default: "ghcr.io"
      dockerfile:
        description: "Path to the Dockerfile relative to the repo root."
        required: true
        type: string
      context:
        description: "Docker build context."
        required: false
        type: string
        default: "."
      platforms:
        description: "Comma-separated buildx platforms."
        required: false
        type: string
        default: "linux/amd64,linux/arm64"
      push:
        description: "Push the built image (false = build only, e.g. on PRs)."
        required: false
        type: boolean
        default: true
      sign:
        description: "Cosign keyless-sign the published image (applied only when pushing)."
        required: false
        type: boolean
        default: true
      attest:
        description: "Attest build provenance + SBOM (applied only when pushing)."
        required: false
        type: boolean
        default: true
      scan:
        description: "Run Trivy against the pushed image and upload SARIF to code scanning."
        required: false
        type: boolean
        default: true
      tags:
        description: "Multi-line input passed verbatim to docker/metadata-action tags."
        required: false
        type: string
        default: |
          type=sha,format=short
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=raw,value=latest,enable={{is_default_branch}}
      labels:
        description: "Multi-line input passed verbatim to docker/metadata-action labels."
        required: false
        type: string
        default: ""
      build-args:
        description: "Multi-line non-secret build args. APP_VERSION is auto-injected from the resolved tag."
        required: false
        type: string
        default: ""
      cache-scope:
        description: "GHA cache scope. Defaults to `<image-name>-<ref_name>` with a `<image-name>-main` fallback."
        required: false
        type: string
        default: ""
    secrets:
      SECRET_BUILD_ARGS:
        description: >-
          Optional multi-line KEY=value build args sourced from secrets (e.g. public
          config baked into an SPA bundle). Anything passed here ends up readable in
          the image — never pass real credentials as build args.
        required: false
      REGISTRY_USERNAME:
        description: "Registry username. Defaults to github.actor (fine for GHCR)."
        required: false
      REGISTRY_PASSWORD:
        description: "Registry password/token. Defaults to GITHUB_TOKEN (fine for GHCR)."
        required: false
    outputs:
      image-digest:
        description: "Digest (sha256:...) of the built image."
        value: ${{ jobs.build-push.outputs.image_digest }}
      image-tag:
        description: "Primary tag resolved by docker/metadata-action."
        value: ${{ jobs.build-push.outputs.image_tag }}
      image-ref:
        description: "Full image reference without tag, e.g. ghcr.io/owner/my-api."
        value: ${{ jobs.build-push.outputs.image_ref }}

permissions:
  contents: read

jobs:
  build-push:
    name: Build & Push ${{ inputs.image-name }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    outputs:
      image_digest: ${{ steps.build.outputs.digest }}
      image_tag: ${{ steps.meta.outputs.version }}
      image_ref: ${{ steps.image.outputs.ref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve image reference
        id: image
        shell: bash
        env:
          REGISTRY: ${{ inputs.registry }}
          OWNER: ${{ github.repository_owner }}
          IMAGE_NAME: ${{ inputs.image-name }}
          CACHE_SCOPE: ${{ inputs.cache-scope }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          ref="${REGISTRY}/${OWNER,,}/${IMAGE_NAME}"
          scope="${CACHE_SCOPE:-${IMAGE_NAME}-${REF_NAME}}"
          {
            echo "ref=${ref}"
            echo "cache_scope=${scope}"
          } >> "$GITHUB_OUTPUT"
          echo "::notice title=Image::${ref} (cache scope: ${scope})"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8  # v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4.2.0
        with:
          driver: docker-container

      - name: Login to registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302  # v6.2.0
        with:
          images: ${{ steps.image.outputs.ref }}
          tags: ${{ inputs.tags }}
          labels: ${{ inputs.labels }}

      - name: Build & push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7.3.0
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          provenance: ${{ inputs.push && inputs.attest }}
          sbom: ${{ inputs.push && inputs.attest }}
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.version }}
            ${{ inputs.build-args }}
            ${{ secrets.SECRET_BUILD_ARGS }}
          cache-from: |
            type=gha,scope=${{ steps.image.outputs.cache_scope }}
            type=gha,scope=${{ inputs.image-name }}-main
          cache-to: type=gha,scope=${{ steps.image.outputs.cache_scope }},mode=max

      - name: Attest build provenance
        if: inputs.push && inputs.attest && steps.build.outputs.digest != ''
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-name: ${{ steps.image.outputs.ref }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        if: inputs.push && inputs.sign && steps.build.outputs.digest != ''
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign image (cosign keyless OIDC)
        if: inputs.push && inputs.sign && steps.build.outputs.digest != ''
        shell: bash
        env:
          IMAGE_REF: ${{ steps.image.outputs.ref }}@${{ steps.build.outputs.digest }}
        run: |
          echo "::group::cosign sign (keyless)"
          cosign sign --yes "$IMAGE_REF"
          echo "::endgroup::"
          echo "::notice title=Cosign::Signed ${IMAGE_REF}"

      - name: Write image summary
        if: always() && steps.build.outputs.digest != ''
        shell: bash
        env:
          IMAGE: ${{ steps.image.outputs.ref }}
          TAG: ${{ steps.meta.outputs.version }}
          DIGEST: ${{ steps.build.outputs.digest }}
          PUSHED: ${{ inputs.push }}
        run: |
          echo "::notice title=Image built::${IMAGE}:${TAG} digest=${DIGEST} pushed=${PUSHED}"
          {
            echo "### Image: \`${IMAGE}\`"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Tag | \`${TAG}\` |"
            echo "| Digest | \`${DIGEST}\` |"
            echo "| Pushed | ${PUSHED} |"
          } >> "$GITHUB_STEP_SUMMARY"

  scan:
    name: Scan Image (Trivy)
    runs-on: ubuntu-latest
    needs: build-push
    if: inputs.scan && inputs.push && needs.build-push.outputs.image_tag != ''
    timeout-minutes: 15
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Login to registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME || github.actor }}
          password: ${{ secrets.REGISTRY_PASSWORD || github.token }}

      - name: Warm Docker daemon (surface registry errors before scan)
        shell: bash
        env:
          IMAGE_REF: ${{ needs.build-push.outputs.image_ref }}:${{ needs.build-push.outputs.image_tag }}
        run: |
          for i in 1 2 3; do
            if docker pull "$IMAGE_REF"; then
              exit 0
            fi
            echo "::warning::Pull attempt $i for $IMAGE_REF failed; retrying in 5s"
            sleep 5
          done
          echo "::error title=Trivy::Image not pullable from registry: $IMAGE_REF"
          exit 1

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: ${{ needs.build-push.outputs.image_ref }}:${{ needs.build-push.outputs.image_tag }}
          format: sarif
          output: trivy-${{ inputs.image-name }}.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 0

      - name: Upload Trivy SARIF to GitHub code scanning
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4.37.0
        with:
          sarif_file: trivy-${{ inputs.image-name }}.sarif
          category: trivy-${{ inputs.image-name }}

      - name: Write scan summary
        if: always()
        shell: bash
        env:
          IMAGE_NAME: ${{ inputs.image-name }}
          IMAGE_REF: ${{ needs.build-push.outputs.image_ref }}:${{ needs.build-push.outputs.image_tag }}
        run: |
          {
            echo "### Trivy scan — ${IMAGE_NAME}"
            echo ""
            echo "- Image: \`${IMAGE_REF}\`"
            echo "- Findings uploaded to **Security → Code scanning → trivy-${IMAGE_NAME}**"
          } >> "$GITHUB_STEP_SUMMARY"
