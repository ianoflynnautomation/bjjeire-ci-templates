name: CI

# Lints the templates themselves. Reusable workflows and composite actions
# have no runtime of their own, so static analysis is the whole test suite.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  lint:
    name: Lint Workflows & Actions
    permissions:
      contents: read
      checks: write
    uses: ./.github/workflows/lint-workflows.yml
    with:
      zizmor-paths: ".github/workflows/ actions/ examples/"
