# Reusable workflow: merge Playwright blob reports + gate the result.
#
# Extracted from playwright-tests.yml and playwright-docker.yml, which both
# repeated the same "download blob-report-* -> merge -> summary -> gate"
# sequence. Called as a job: it downloads the blob reports produced by the
# upstream matrix job (nested reusable workflows share the run's artifacts),
# merges them into the requested reporters, and fails the gate if the upstream
# test job didn't pass.
#
# Not meant for external consumption — it's the shared tail of the test
# runners. Callers pass the matrix job's result via `test_result`.

name: Playwright Report + Gate

on:
  workflow_call:
    inputs:
      test_repo:
        description: 'Owner/repo holding the test code (needed for `npx playwright`). Empty = caller repo.'
        type: string
        required: false
        default: ''
      test_repo_ref:
        description: 'Git ref of the test repo to check out.'
        type: string
        required: false
        default: 'main'
      node_version:
        description: 'Node.js version for the merge job.'
        type: string
        required: false
        default: '22'
      reporters:
        description: 'Reporters passed to `playwright merge-reports --reporter`.'
        type: string
        required: false
        default: 'html,json'
      upload_junit:
        description: 'Upload test-results/junit.xml as an artifact (requires junit in reporters).'
        type: boolean
        required: false
        default: false
      fail_on_flaky:
        description: 'Fail the gate when any test passed only after retry. Flake policy: flakes on the main gate are failures-in-waiting.'
        type: boolean
        required: false
        default: false
      publish_report:
        description: >-
          Publish the merged HTML report with GitHub Pages Actions under
          reports/<run_id>/. Requires Pages source set to GitHub Actions and the
          caller granting `pages: write` plus `id-token: write`.
        type: boolean
        required: false
        default: false
      report_keep_runs:
        description: 'Compatibility-only; GitHub Pages Actions deploys the current report artifact.'
        type: number
        required: false
        default: 30
      test_result:
        description: 'Result of the upstream matrix test job (needs.<job>.result). Drives the gate.'
        type: string
        required: true

    outputs:
      failed_count:
        description: 'Number of failed tests across all shards (0 on green).'
        value: ${{ jobs.merge-reports.outputs.failed_count }}
      flaky_count:
        description: 'Number of flaky tests (passed only after retry).'
        value: ${{ jobs.merge-reports.outputs.flaky_count }}
      report_artifact_name:
        description: 'Name of the merged HTML report artifact.'
        value: ${{ jobs.merge-reports.outputs.report_artifact_name }}
      report_url:
        description: 'Public URL of the published HTML report (empty unless publish_report ran).'
        value: ${{ jobs.publish-report.outputs.report_url }}
      status:
        description: 'success | failure — gated result of the upstream test job.'
        value: ${{ jobs.gate.outputs.status }}

jobs:
  merge-reports:
    name: Merge reports
    runs-on: ubuntu-latest
    if: always()
    permissions:
      contents: read
      actions: read
    outputs:
      failed_count: ${{ steps.summary.outputs.failed_count }}
      flaky_count: ${{ steps.summary.outputs.flaky_count }}
      report_ready: ${{ steps.merge.outputs.skipped == 'false' }}
      report_artifact_name: playwright-html-report
    steps:
      - name: Checkout test repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.test_repo }}
          ref: ${{ inputs.test_repo_ref }}
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020  # v7.0.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'npm'

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: Download blob reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: blob-report-*
          merge-multiple: true
          path: all-blob-reports
        continue-on-error: true

      - name: Merge reports
        id: merge
        shell: bash
        env:
          REPORTERS: ${{ inputs.reporters }}
        run: |
          set -eo pipefail
          if [ -z "$(ls -A all-blob-reports 2>/dev/null)" ]; then
            echo "::warning title=Merge skipped::No blob reports found; nothing to merge"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "::group::playwright merge-reports"
          npx playwright merge-reports --reporter "${REPORTERS}" ./all-blob-reports
          echo "::endgroup::"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

      - name: Compute summary
        id: summary
        if: steps.merge.outputs.skipped == 'false'
        shell: bash
        env:
          UPSTREAM_RESULT: ${{ inputs.test_result }}
        run: |
          set -eo pipefail
          passed=$(jq '.stats.expected // 0' test-results/results.json 2>/dev/null || echo 0)
          failed=$(jq '.stats.unexpected // 0' test-results/results.json 2>/dev/null || echo 0)
          flaky=$(jq '.stats.flaky // 0' test-results/results.json 2>/dev/null || echo 0)
          skipped=$(jq '.stats.skipped // 0' test-results/results.json 2>/dev/null || echo 0)
          echo "failed_count=${failed:-0}" >> "$GITHUB_OUTPUT"
          echo "flaky_count=${flaky:-0}" >> "$GITHUB_OUTPUT"
          {
            echo "## Playwright results"
            echo ""
            echo "| Passed | Failed | Flaky | Skipped | Upstream job |"
            echo "|-------:|-------:|------:|--------:|--------------|"
            echo "| ${passed} | ${failed} | ${flaky} | ${skipped} | \`${UPSTREAM_RESULT}\` |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "${failed:-0}" -gt 0 ]; then
            echo "::error title=Tests failed::${failed} failed, ${flaky} flaky"
          elif [ "${flaky:-0}" -gt 0 ]; then
            echo "::warning title=Flaky tests::${flaky} test(s) passed only after retry"
          else
            echo "::notice title=All tests passed::0 failed, 0 flaky"
          fi

      - name: Upload HTML report
        if: steps.merge.outputs.skipped == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-html-report
          path: playwright-report/
          retention-days: 30
          compression-level: 9

      - name: Upload JSON results
        if: steps.merge.outputs.skipped == 'false'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-json-results
          path: test-results/results.json
          retention-days: 30
          compression-level: 9

      - name: Upload JUnit report
        if: steps.merge.outputs.skipped == 'false' && inputs.upload_junit
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: playwright-junit
          path: test-results/junit.xml
          retention-days: 90
          compression-level: 9
          if-no-files-found: ignore

  publish-report:
    name: Publish report (GitHub Pages)
    runs-on: ubuntu-latest
    needs: [merge-reports]
    if: ${{ !cancelled() && inputs.publish_report && needs.merge-reports.outputs.report_ready == 'true' }}
    permissions:
      actions: read
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PAGES_ARTIFACT_NAME: playwright-report-pages-${{ github.run_id }}-${{ github.run_attempt }}
    outputs:
      report_url: ${{ steps.report-url.outputs.report_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6

      - name: Download HTML report
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: playwright-html-report
          path: ${{ runner.temp }}/html-report

      - name: Prepare Pages artifact
        shell: bash
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          pages_dir="${RUNNER_TEMP}/pages"
          report_dir="${pages_dir}/reports/${RUN_ID}"
          mkdir -p "${report_dir}"
          cp -R "${RUNNER_TEMP}/html-report/." "${report_dir}/"
          touch "${pages_dir}/.nojekyll"
          cat > "${pages_dir}/index.html" <<EOF
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=reports/${RUN_ID}/">
              <title>Playwright Test Report</title>
            </head>
            <body>
              <p><a href="reports/${RUN_ID}/">Open Playwright test report</a></p>
            </body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          name: ${{ env.PAGES_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/pages
          include-hidden-files: true

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
        with:
          artifact_name: ${{ env.PAGES_ARTIFACT_NAME }}

      - name: Publish report URL
        id: report-url
        shell: bash
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          url="${PAGE_URL%/}/reports/${RUN_ID}/"
          echo "report_url=${url}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Report published::${url}"
          {
            echo "## Playwright HTML report"
            echo ""
            echo "${url}"
            echo ""
            echo "_First deployment after switching Pages to GitHub Actions can take ~1 minute to go live._"
          } >> "$GITHUB_STEP_SUMMARY"

  gate:
    name: Result gate
    runs-on: ubuntu-latest
    needs: [merge-reports]
    if: always()
    permissions:
      contents: read
    outputs:
      status: ${{ steps.eval.outputs.status }}
    steps:
      - id: eval
        shell: bash
        env:
          TEST_RESULT: ${{ inputs.test_result }}
          FAIL_ON_FLAKY: ${{ inputs.fail_on_flaky }}
          FLAKY: ${{ needs.merge-reports.outputs.flaky_count }}
        run: |
          set -euo pipefail
          if [ "$TEST_RESULT" = "failure" ] || [ "$TEST_RESULT" = "cancelled" ]; then
            echo "::error title=Gate failed::test job result was '${TEST_RESULT}'"
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          if [ "${FAIL_ON_FLAKY}" = "true" ] && [ "${FLAKY:-0}" -gt 0 ]; then
            echo "::error title=Gate failed::${FLAKY} flaky test(s) and fail_on_flaky is enabled — fix or @quarantine them"
            echo "status=failure" >> "$GITHUB_OUTPUT"
            exit 1
          fi
          echo "::notice title=Gate passed::test job result was '${TEST_RESULT}' (flaky: ${FLAKY:-0})"
          echo "status=success" >> "$GITHUB_OUTPUT"
