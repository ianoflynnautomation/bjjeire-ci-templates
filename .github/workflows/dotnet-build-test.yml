name: .NET Build & Test (Reusable)

# Reusable golden path for .NET solutions: optional format check, build once,
# then run test projects as a matrix against the shared build output.
#
# Required caller permissions:
#   contents: read
#   checks: write          # only when publish-test-report: true
#
# No top-level concurrency here — reusable workflows inherit github.workflow
# from the caller; declaring the same group in both self-deadlocks. Put
# concurrency on the caller only.
#
# Note: NuGet cache steps are inlined (not the setup-dotnet-cached composite)
# because relative `uses: ./actions/...` resolve against the *caller* repo.

on:
  workflow_call:
    inputs:
      solution-path:
        description: "Path to the .sln (or .csproj) to restore and build."
        required: true
        type: string
      configuration:
        description: "Build configuration."
        required: false
        type: string
        default: "Release"
      container-image:
        description: ".NET SDK container image jobs run in — the single source of truth for the toolchain version."
        required: false
        type: string
        default: "mcr.microsoft.com/dotnet/sdk:10.0"
      runs-on:
        description: "Runner label(s) for every job (e.g. ubuntu-latest or a self-hosted label)."
        required: false
        type: string
        default: "ubuntu-latest"
      run-format-check:
        description: "Run `dotnet format --verify-no-changes` (whitespace + style) alongside the build."
        required: false
        type: boolean
        default: false
      format-include:
        description: "Value for `dotnet format --include`."
        required: false
        type: string
        default: "./src/"
      format-exclude:
        description: "Value for `dotnet format --exclude` (empty = none)."
        required: false
        type: string
        default: ""
      test-projects:
        description: >-
          Newline-separated .csproj paths run as a matrix against the pre-built
          output. The matrix name is the csproj filename without extension.
          Empty skips testing.
        required: false
        type: string
        default: ""
      test-filter:
        description: "dotnet test --filter applied to every test project (empty = no filter)."
        required: false
        type: string
        default: ""
      test-fail-fast:
        description: "Cancel remaining matrix legs when one test project fails."
        required: false
        type: boolean
        default: true
      verbosity:
        description: "dotnet CLI verbosity (quiet, minimal, normal, detailed, diagnostic)."
        required: false
        type: string
        default: "minimal"
      restore-arguments:
        description: "Extra arguments appended to `dotnet restore` (shell-split)."
        required: false
        type: string
        default: ""
      build-arguments:
        description: "Extra arguments appended to `dotnet build` (shell-split)."
        required: false
        type: string
        default: ""
      test-arguments:
        description: "Extra arguments appended to `dotnet test` (shell-split)."
        required: false
        type: string
        default: ""
      nuget-cache-key-prefix:
        description: "Prefix for the NuGet cache key (segment monorepo caches per solution)."
        required: false
        type: string
        default: "nuget"
      publish-test-report:
        description: "Publish a dotnet-trx test report check from the TRX artifacts. Requires the caller to grant checks: write."
        required: false
        type: boolean
        default: false
      test-report-name:
        description: "Check name used by the test reporter."
        required: false
        type: string
        default: "Test Results"
      build-artifact-name:
        description: "Artifact name for the build output shared with the test matrix."
        required: false
        type: string
        default: "dotnet-build"
      build-artifact-paths:
        description: "Multi-line paths uploaded as the build-output artifact."
        required: false
        type: string
        default: |
          src/**/bin
          src/**/obj
          tests/**/bin
          tests/**/obj
      artifact-retention-days:
        description: "Retention days for build and test artifacts."
        required: false
        type: number
        default: 1
    outputs:
      build-successful:
        description: "true when the solution built successfully."
        value: ${{ jobs.build.outputs.build_successful }}

jobs:
  plan:
    name: Plan Test Matrix
    if: inputs.test-projects != ''
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 5
    permissions: {}
    outputs:
      test_matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - name: Plan test matrix
        id: plan
        shell: bash
        env:
          TEST_PROJECTS: ${{ inputs.test-projects }}
        run: |
          set -euo pipefail
          matrix=$(printf '%s\n' "$TEST_PROJECTS" | jq -R -n -c \
            '[inputs | gsub("^\\s+|\\s+$"; "") | select(length > 0)
              | {project: ., name: (split("/") | last | sub("\\.csproj$"; ""))}]')
          count=$(echo "$matrix" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "::error title=Test matrix::test-projects was non-empty but produced zero projects"
            exit 1
          fi
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Test matrix::${count} project(s) planned"
          {
            echo "### Test matrix"
            echo ""
            echo "| Name | Project |"
            echo "| --- | --- |"
            echo "$matrix" | jq -r '.[] | "| \(.name) | `\(.project)` |"'
          } >> "$GITHUB_STEP_SUMMARY"

  format:
    name: Format Check
    if: inputs.run-format-check
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ${{ inputs.container-image }}
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ inputs.nuget-cache-key-prefix }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.nuget-cache-key-prefix }}-
      - name: Check .NET code formatting
        shell: bash
        env:
          SOLUTION_PATH: ${{ inputs.solution-path }}
          FORMAT_INCLUDE: ${{ inputs.format-include }}
          FORMAT_EXCLUDE: ${{ inputs.format-exclude }}
        run: |
          set -euo pipefail
          EXCLUDE_ARG=()
          if [ -n "$FORMAT_EXCLUDE" ]; then
            EXCLUDE_ARG=(--exclude "$FORMAT_EXCLUDE")
          fi
          echo "::group::dotnet format whitespace"
          dotnet format whitespace "$SOLUTION_PATH" --include "$FORMAT_INCLUDE" "${EXCLUDE_ARG[@]}" --verify-no-changes --verbosity diagnostic
          echo "::endgroup::"
          echo "::group::dotnet format style"
          dotnet format style "$SOLUTION_PATH" --include "$FORMAT_INCLUDE" "${EXCLUDE_ARG[@]}" --verify-no-changes --verbosity diagnostic
          echo "::endgroup::"
          echo "::notice title=Format check::Formatting checks passed"

  build:
    name: Build Solution
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ${{ inputs.container-image }}
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      build_successful: ${{ steps.build_step.outcome == 'success' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ inputs.nuget-cache-key-prefix }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.nuget-cache-key-prefix }}-
      - name: Restore dependencies
        shell: bash
        env:
          SOLUTION_PATH: ${{ inputs.solution-path }}
          VERBOSITY: ${{ inputs.verbosity }}
          RESTORE_ARGUMENTS: ${{ inputs.restore-arguments }}
        run: |
          set -euo pipefail
          EXTRA=()
          # shellcheck disable=SC2206
          if [ -n "$RESTORE_ARGUMENTS" ]; then
            read -r -a EXTRA <<< "$RESTORE_ARGUMENTS"
          fi
          echo "::group::dotnet restore"
          dotnet restore "$SOLUTION_PATH" --verbosity "$VERBOSITY" "${EXTRA[@]}"
          echo "::endgroup::"
      - name: Build
        id: build_step
        shell: bash
        env:
          SOLUTION_PATH: ${{ inputs.solution-path }}
          CONFIGURATION: ${{ inputs.configuration }}
          VERBOSITY: ${{ inputs.verbosity }}
          BUILD_ARGUMENTS: ${{ inputs.build-arguments }}
        run: |
          set -euo pipefail
          EXTRA=()
          if [ -n "$BUILD_ARGUMENTS" ]; then
            read -r -a EXTRA <<< "$BUILD_ARGUMENTS"
          fi
          echo "::group::dotnet build"
          dotnet build "$SOLUTION_PATH" --configuration "$CONFIGURATION" --no-restore --verbosity "$VERBOSITY" "${EXTRA[@]}"
          echo "::endgroup::"
          echo "::notice title=Build .NET::Solution built successfully ($CONFIGURATION)"
      - name: Upload build output
        if: inputs.test-projects != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ inputs.build-artifact-name }}
          path: ${{ inputs.build-artifact-paths }}
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
      - name: Write build summary
        if: always()
        shell: bash
        env:
          SOLUTION_PATH: ${{ inputs.solution-path }}
          CONFIGURATION: ${{ inputs.configuration }}
          CONTAINER_IMAGE: ${{ inputs.container-image }}
          OUTCOME: ${{ steps.build_step.outcome }}
        run: |
          {
            echo "### .NET build"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Solution | \`${SOLUTION_PATH}\` |"
            echo "| Configuration | \`${CONFIGURATION}\` |"
            echo "| SDK image | \`${CONTAINER_IMAGE}\` |"
            echo "| Result | ${OUTCOME} |"
          } >> "$GITHUB_STEP_SUMMARY"

  test:
    name: Test ${{ matrix.name }}
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ${{ inputs.container-image }}
    needs: [plan, build]
    if: inputs.test-projects != ''
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: ${{ inputs.test-fail-fast }}
      matrix:
        include: ${{ fromJSON(needs.plan.outputs.test_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-${{ inputs.nuget-cache-key-prefix }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-${{ inputs.nuget-cache-key-prefix }}-
      - name: Download build output
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.build-artifact-name }}
          path: .
      - name: Run tests — ${{ matrix.name }}
        shell: bash
        env:
          PROJECT_PATH: ${{ matrix.project }}
          RESULTS_PREFIX: ${{ matrix.name }}
          FILTER_CRITERIA: ${{ inputs.test-filter }}
          CONFIGURATION: ${{ inputs.configuration }}
          VERBOSITY: ${{ inputs.verbosity }}
          TEST_ARGUMENTS: ${{ inputs.test-arguments }}
        run: |
          set -euo pipefail
          echo "::group::dotnet test (${RESULTS_PREFIX})"
          FILTER_ARG=()
          if [ -n "$FILTER_CRITERIA" ]; then
            FILTER_ARG=(--filter "$FILTER_CRITERIA")
          fi
          EXTRA=()
          if [ -n "$TEST_ARGUMENTS" ]; then
            read -r -a EXTRA <<< "$TEST_ARGUMENTS"
          fi
          # upload-artifact strips the exec bit; apphost names often contain dots
          find . -type f -path '*/bin/*' -exec chmod +x {} + 2>/dev/null || true
          dotnet test "$PROJECT_PATH" \
            --configuration "$CONFIGURATION" \
            --no-build --no-restore \
            --verbosity "$VERBOSITY" \
            --logger "trx;LogFileName=${RESULTS_PREFIX}.trx" \
            --results-directory "TestResults/${RESULTS_PREFIX}" \
            "${FILTER_ARG[@]}" \
            "${EXTRA[@]}"
          echo "::endgroup::"
          echo "::notice title=Tests passed::${RESULTS_PREFIX}"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: test_results_${{ matrix.name }}
          path: TestResults/${{ matrix.name }}
          retention-days: ${{ inputs.artifact-retention-days }}

  report:
    name: Publish Test Report
    runs-on: ${{ inputs.runs-on }}
    needs: test
    if: |
      always() && inputs.publish-test-report &&
      (needs.test.result == 'success' || needs.test.result == 'failure')
    timeout-minutes: 10
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Download test result artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: test_results_*
          path: test_artifacts
      - name: List downloaded results
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Downloaded test artifacts"
          find test_artifacts -maxdepth 3 -type f -name '*.trx' | sort
          echo "::endgroup::"
          TRX_COUNT="$(find test_artifacts -type f -name '*.trx' | wc -l | tr -d ' ')"
          echo "::notice title=Test artifacts::Found ${TRX_COUNT} TRX file(s)"
      - name: Publish test results summary
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2  # v3.0.0
        with:
          name: ${{ inputs.test-report-name }}
          path: "test_artifacts/**/*.trx"
          reporter: dotnet-trx
          fail-on-error: true
