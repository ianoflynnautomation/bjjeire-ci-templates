name: Terraform Apply (Reusable)

# Applies the exact binary plan produced by terraform-plan.yml. Designed to
# run in the SAME workflow run as the plan job (artifacts do not cross runs);
# gate the apply with a GitHub environment that has required reviewers.
#
# Required caller permissions:
#   contents: read
#   id-token: write

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Terraform root module (must match the plan job)."
        required: false
        type: string
        default: "."
      terraform-version:
        description: >-
          Terraform CLI version constraint passed to hashicorp/setup-terraform.
          Prefer a pinned version (e.g. 1.10.5) over `latest` for reproducibility.
        required: false
        type: string
        default: "1.10.5"
      backend-config:
        description: "Multi-line `key=value` pairs, each passed to `terraform init -backend-config=` (must match the plan job)."
        required: false
        type: string
        default: ""
      workspace:
        description: "Optional Terraform workspace to select (must match the plan job)."
        required: false
        type: string
        default: ""
      init-args:
        description: "Extra arguments appended to `terraform init` (after backend-config flags)."
        required: false
        type: string
        default: ""
      environment:
        description: "GitHub environment gating the apply — configure required reviewers there for manual approval."
        required: true
        type: string
      plan-artifact-name:
        description: "Artifact name of the binary plan file uploaded by terraform-plan.yml."
        required: false
        type: string
        default: "tfplan"
      runs-on:
        description: "Runner label for the apply job."
        required: false
        type: string
        default: "ubuntu-latest"
      tf-log:
        description: "Optional TF_LOG level (TRACE, DEBUG, INFO, WARN, ERROR). Empty = default."
        required: false
        type: string
        default: ""
      plugin-cache:
        description: "Cache the Terraform plugin directory between runs."
        required: false
        type: boolean
        default: true
    secrets:
      ARM_CLIENT_ID:
        description: "Azure AD app (workload identity) client ID for OIDC auth."
        required: false
      ARM_TENANT_ID:
        description: "Azure tenant ID for OIDC auth."
        required: false
      ARM_SUBSCRIPTION_ID:
        description: "Azure subscription ID."
        required: false

permissions:
  contents: read

jobs:
  apply:
    name: Apply
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 60
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_USE_OIDC: "true"
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_LOG: ${{ inputs.tf-log }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e  # v4.0.1
        with:
          terraform_version: ${{ inputs.terraform-version }}
          terraform_wrapper: false
      - name: Prepare plugin cache directory
        if: inputs.plugin-cache
        shell: bash
        run: mkdir -p "$HOME/.terraform.d/plugin-cache"
      - name: Cache Terraform plugins
        if: inputs.plugin-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9  # v6.1.0
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-tfplugins-${{ inputs.terraform-version }}-${{ hashFiles(format('{0}/.terraform.lock.hcl', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-tfplugins-${{ inputs.terraform-version }}-
            ${{ runner.os }}-tfplugins-
      - name: Configure plugin cache
        if: inputs.plugin-cache
        shell: bash
        run: echo "TF_PLUGIN_CACHE_DIR=$HOME/.terraform.d/plugin-cache" >> "$GITHUB_ENV"
      - name: Download plan artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: ${{ inputs.plan-artifact-name }}
          path: ${{ inputs.working-directory }}
      - name: Verify plan artifact
        shell: bash
        env:
          PLAN_PATH: ${{ inputs.working-directory }}/tfplan
        run: |
          set -euo pipefail
          if [ ! -f "$PLAN_PATH" ]; then
            echo "::error title=Terraform apply::Plan artifact missing at ${PLAN_PATH}"
            exit 1
          fi
          size=$(wc -c < "$PLAN_PATH" | tr -d ' ')
          echo "::notice title=Terraform apply::Plan artifact present (${size} bytes)"
      - name: Terraform init
        shell: bash
        env:
          BACKEND_CONFIG: ${{ inputs.backend-config }}
          INIT_ARGS: ${{ inputs.init-args }}
        run: |
          set -euo pipefail
          echo "::group::terraform init"
          BACKEND_ARGS=()
          while IFS= read -r line; do
            [ -n "$line" ] && BACKEND_ARGS+=("-backend-config=${line}")
          done <<< "$BACKEND_CONFIG"
          EXTRA=()
          if [ -n "$INIT_ARGS" ]; then
            read -r -a EXTRA <<< "$INIT_ARGS"
          fi
          terraform init "${BACKEND_ARGS[@]}" "${EXTRA[@]}"
          echo "::endgroup::"
      - name: Select workspace
        if: inputs.workspace != ''
        shell: bash
        env:
          TF_WORKSPACE_NAME: ${{ inputs.workspace }}
        # Do not -or-create on apply: the plan job must have created it already.
        run: terraform workspace select "$TF_WORKSPACE_NAME"
      - name: Terraform apply
        shell: bash
        env:
          PLAN_ARTIFACT: ${{ inputs.plan-artifact-name }}
        run: |
          set -euo pipefail
          echo "::group::terraform apply"
          terraform apply -auto-approve tfplan
          echo "::endgroup::"
          echo "::notice title=Terraform apply::Applied plan from artifact '${PLAN_ARTIFACT}'"
      - name: Write apply summary
        if: always()
        shell: bash
        env:
          ENVIRONMENT: ${{ inputs.environment }}
          WORKDIR: ${{ inputs.working-directory }}
          JOB_STATUS: ${{ job.status }}
        run: |
          {
            echo "### Terraform apply"
            echo ""
            echo "| Field | Value |"
            echo "| --- | --- |"
            echo "| Environment | \`${ENVIRONMENT}\` |"
            echo "| Module | \`${WORKDIR}\` |"
            echo "| Result | ${JOB_STATUS} |"
          } >> "$GITHUB_STEP_SUMMARY"
