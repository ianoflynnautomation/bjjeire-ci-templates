# Reusable workflow: Docker-provisioned Playwright tests.
#
# Docker provisioning and test execution stay in the same workflow because the
# compose stack must live on the same runner that executes the tests.

name: Playwright Tests (Docker)

on:
  workflow_call:
    inputs:
      compose_file:
        description: 'Path (relative to caller checkout) to docker-compose.yml. Ignored when compose_files is set.'
        type: string
        required: false
        default: 'docker-compose.yml'
      compose_files:
        description: 'Newline-separated list of compose files (relative to caller checkout), stacked left-to-right. Takes precedence over compose_file.'
        type: string
        required: false
        default: ''
      compose_pre_up_script:
        description: 'Path (relative to caller checkout) to a bash script run before docker compose up.'
        type: string
        required: false
        default: ''
      compose_health_url:
        description: 'URL polled until 200-OK before tests start.'
        type: string
        required: false
        default: ''
      seed_data:
        description: 'Run docker compose seeder after startup.'
        type: boolean
        required: false
        default: false
      base_url:
        description: 'BASE_URL for tests.'
        type: string
        required: true
      api_base_url:
        description: 'API_URL for tests.'
        type: string
        required: true
      test_tags:
        description: 'Playwright grep filter, e.g. "@smoke" or "@acceptance" (full suite).'
        type: string
        required: false
        default: '@acceptance'
      fail_on_flaky:
        description: 'Fail the gate when any test passed only after retry (flake policy — see playwright-report.yml).'
        type: boolean
        required: false
        default: false
      publish_report:
        description: >-
          Publish the merged HTML report to the running repo's gh-pages branch.
          Requires Pages enabled from gh-pages and the caller granting contents: write.
        type: boolean
        required: false
        default: false
      shard_total:
        description: 'Default number of parallel shards per project (overridable via project_shard_overrides).'
        type: number
        required: false
        default: 6
      project_shard_overrides:
        description: 'JSON object mapping project name to shard count. Projects not listed use shard_total. Example: {"api":3,"webkit-desktop":2}.'
        type: string
        required: false
        default: '{"api":3,"firefox-desktop":4,"webkit-desktop":3,"chromium-wide":3,"snapshots":1,"a11y":1,"mobile-iphone":1,"mobile-galaxy":1}'
      playwright_projects:
        description: 'JSON array of Playwright project names to run. Must match project names in src/ui/config/playwright.ts and src/api/config/playwright.ts.'
        type: string
        required: false
        default: '["api","chromium-desktop","firefox-desktop","webkit-desktop","chromium-wide","snapshots","a11y","mobile-iphone","mobile-galaxy"]'
      node_version:
        description: 'Node.js version for setup-node and merge job.'
        type: string
        required: false
        default: '22'
      test_repo:
        description: 'Owner/repo holding the test code.'
        type: string
        required: false
        default: ''
      test_repo_ref:
        description: 'Git ref of the test repo to check out.'
        type: string
        required: false
        default: 'main'

    secrets:
      GHCR_TOKEN:
        required: false
      EPHEMERAL_MONGO_URL:
        required: false
      EPHEMERAL_MONGO_DB:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_TESTS_CLIENT_ID:
        required: false
      AZURE_TESTS_CLIENT_SECRET:
        required: false
      AZURE_API_SCOPE:
        required: false
      AZURE_AUTHORITY:
        required: false
      CF_ACCESS_CLIENT_ID:
        required: false
      CF_ACCESS_CLIENT_SECRET:
        required: false
      PW_TEST_USER:
        required: false
      PW_TEST_PASSWORD:
        required: false
      OTEL_EXPORTER_OTLP_ENDPOINT:
        required: false
      OTEL_EXPORTER_OTLP_HEADERS:
        required: false

    outputs:
      test_status:
        description: 'success | failure — aggregated result of the matrix test job.'
        value: ${{ jobs.report.outputs.status }}
      failed_count:
        description: 'Number of failed tests across all shards (0 on green).'
        value: ${{ jobs.report.outputs.failed_count }}
      report_artifact_name:
        description: 'Name of the merged HTML report artifact.'
        value: ${{ jobs.report.outputs.report_artifact_name }}
      report_url:
        description: 'Public URL of the published HTML report (empty unless publish_report).'
        value: ${{ jobs.report.outputs.report_url }}

jobs:
  setup:
    name: Plan matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      shard_matrix: ${{ steps.plan.outputs.shard_matrix }}
    steps:
      - id: plan
        shell: bash
        env:
          PROJECTS: ${{ inputs.playwright_projects }}
          OVERRIDES: ${{ inputs.project_shard_overrides }}
          DEFAULT_SHARDS: ${{ inputs.shard_total }}
        run: |
          set -euo pipefail
          # Expand projects × per-project shard counts into a flat matrix.
          # Each entry: { name, config, shard, shard_total }.
          # Note: bash parses ${OVERRIDES:-{}} as ${OVERRIDES:-{} + "}", which appends
          # a stray "}" when OVERRIDES is set. Assign to a temp var instead.
          overrides_json="${OVERRIDES:-}"
          if [ -z "$overrides_json" ]; then
            overrides_json='{}'
          fi
          matrix=$(jq -nc \
            --argjson projects "${PROJECTS}" \
            --argjson overrides "${overrides_json}" \
            --argjson defaultShards "${DEFAULT_SHARDS}" '
            $projects
            | map(. as $p
                | (($overrides[$p]) // $defaultShards) as $total
                | [range(1; $total + 1)] | map({
                    name: $p,
                    config: (if $p == "api" then "playwright.api.config.ts" else "playwright.ui.config.ts" end),
                    shard: .,
                    shard_total: $total
                  })
              )
            | add
          ')
          echo "shard_matrix=${matrix}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Plan matrix::Planned $(echo "${matrix}" | jq 'length') shard job(s)"

  build-image:
    name: Build test-runner image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image_ref: ${{ steps.image.outputs.ref }}
    steps:
      - name: Checkout test repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          repository: ${{ inputs.test_repo }}
          ref: ${{ inputs.test_repo_ref }}
          persist-credentials: false

      - name: Compute image ref
        id: image
        shell: bash
        run: |
          set -euo pipefail
          # The Dockerfile bakes in the whole test repo (`COPY . .`), so the tag
          # must change whenever ANY repo content changes — tag by the checked-out
          # commit. Hashing only Dockerfile+package files (as before) served stale
          # test code and baselines whenever deps hadn't changed. Rebuilds stay
          # cheap: the npm ci layer only invalidates when package files change.
          hash=$(git rev-parse --short=12 HEAD)
          owner_lc=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          ref="ghcr.io/${owner_lc}/bjjeire-playwright:${hash}"
          echo "ref=${ref}" >> "$GITHUB_OUTPUT"
          echo "::notice title=Runner image::${ref}"

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Check if image already exists
        id: check
        shell: bash
        run: |
          set -eo pipefail
          if docker manifest inspect "${{ steps.image.outputs.ref }}" >/dev/null 2>&1; then
            echo "::notice title=Image cache hit::Skipping build; image already in GHCR"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice title=Image cache miss::Building and pushing runner image"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists == 'false'
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build and push
        if: steps.check.outputs.exists == 'false'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: Dockerfile
          tags: ${{ steps.image.outputs.ref }}
          push: true
          cache-from: type=gha,scope=playwright-runner
          cache-to: type=gha,scope=playwright-runner,mode=max

  docker-test:
    name: Docker ${{ matrix.shard.name }} ${{ matrix.shard.shard }}/${{ matrix.shard.shard_total }}
    runs-on: ubuntu-latest
    needs: [setup, build-image]
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJson(needs.setup.outputs.shard_matrix) }}
    env:
      CI: 'true'
      APP_ENV: docker
      BASE_URL: ${{ inputs.base_url }}
      API_URL: ${{ inputs.api_base_url }}
      ACCEPT_INVALID_CERTS: 'true'
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      MONGO_URL: ${{ secrets.EPHEMERAL_MONGO_URL }}
      MONGO_DB: ${{ secrets.EPHEMERAL_MONGO_DB }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_TESTS_CLIENT_ID: ${{ secrets.AZURE_TESTS_CLIENT_ID }}
      AZURE_TESTS_CLIENT_SECRET: ${{ secrets.AZURE_TESTS_CLIENT_SECRET }}
      AZURE_API_SCOPE: ${{ secrets.AZURE_API_SCOPE }}
      AZURE_AUTHORITY: ${{ secrets.AZURE_AUTHORITY }}
      CF_ACCESS_CLIENT_ID: ${{ secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
      PW_TEST_USER: ${{ secrets.PW_TEST_USER }}
      PW_TEST_PASSWORD: ${{ secrets.PW_TEST_PASSWORD }}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}
      RUNNER_IMAGE: ${{ needs.build-image.outputs.image_ref }}
      COMPOSE_PROJECT_NAME: bjj-${{ github.run_id }}-${{ github.run_attempt }}-${{ matrix.shard.name }}-${{ matrix.shard.shard }}
    steps:
      - name: Checkout caller repo (compose sources)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Compute compose file list
        shell: bash
        env:
          COMPOSE_FILES_INPUT: ${{ inputs.compose_files }}
          COMPOSE_FILE_INPUT: ${{ inputs.compose_file }}
        run: |
          set -euo pipefail
          files="${COMPOSE_FILES_INPUT}"
          if [ -z "${files}" ]; then
            files="${COMPOSE_FILE_INPUT}"
          fi
          # docker compose natively reads COMPOSE_FILE (colon-separated), so no
          # unquoted "-f a -f b" argument string needs threading through steps.
          compose_file=$(echo "${files}" | xargs -n1 | paste -sd: -)
          echo "COMPOSE_FILE=${compose_file}" >> "$GITHUB_ENV"
          echo "::notice title=Compose files::${compose_file}"
          echo "::notice title=Compose project::${COMPOSE_PROJECT_NAME}"

      - name: Run pre-up script
        if: inputs.compose_pre_up_script != ''
        shell: bash
        env:
          PRE_UP_SCRIPT: ${{ inputs.compose_pre_up_script }}
        run: |
          set -euo pipefail
          chmod +x "${PRE_UP_SCRIPT}"
          "${PRE_UP_SCRIPT}"

      - name: Docker compose up (build + wait for healthy)
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::docker compose up"
          docker compose up -d --build --wait --wait-timeout 300
          echo "::endgroup::"
          echo "::group::docker compose ps"
          docker compose ps --all
          echo "::endgroup::"

      - name: Run Seed Data
        if: inputs.seed_data == true
        shell: bash
        run: |
          docker compose run --rm seeder

      - name: Wait for health URL
        if: inputs.compose_health_url != ''
        shell: bash
        env:
          HEALTH_URL: ${{ inputs.compose_health_url }}
        run: |
          set -euo pipefail
          url="${HEALTH_URL}"
          for i in $(seq 1 60); do
            if curl -fsS --max-time 3 "$url" >/dev/null 2>&1; then
              echo "::notice title=Health check::OK after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "::error title=Health check failed::No 200 from $url within 120s"
          echo "::group::docker compose ps"
          docker compose ps --all || true
          echo "::endgroup::"
          echo "::group::compose logs (tail 500)"
          docker compose logs --no-color --tail=500 || true
          echo "::endgroup::"
          exit 1

      - name: Pull test-runner image
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::docker pull ${RUNNER_IMAGE}"
          docker pull "${RUNNER_IMAGE}"
          echo "::endgroup::"

      # Test code is baked into the runner image (tagged by test-repo commit);
      # only host-side output dirs are needed for artifacts.
      - name: Prepare report dirs
        shell: bash
        run: |
          mkdir -p pw-out/playwright-report \
                   pw-out/test-results \
                   pw-out/blob-report \
                   pw-out/allure-results

      - name: Run Playwright tests (in container)
        shell: bash
        env:
          SHARD_NAME: ${{ matrix.shard.name }}
          SHARD_CONFIG: ${{ matrix.shard.config }}
          SHARD_NUM: ${{ matrix.shard.shard }}
          SHARD_TOTAL: ${{ matrix.shard.shard_total }}
          TEST_TAGS: ${{ inputs.test_tags }}
        run: |
          set -euo pipefail
          name="${SHARD_NAME}"
          config="${SHARD_CONFIG}"
          shard="${SHARD_NUM}"
          shard_total="${SHARD_TOTAL}"

          echo "::notice title=Shard::${name} ${shard}/${shard_total} (${config})"

          args=(
            test
            -c "$config"
            --project="$name"
            --shard="${shard}/${shard_total}"
          )
          if [ -n "${TEST_TAGS}" ]; then
            args+=(--grep="${TEST_TAGS}")
          fi

          echo "::group::playwright test (${name} ${shard}/${shard_total})"
          docker run --rm \
            --network host \
            --ipc host \
            -v "${{ github.workspace }}/pw-out/playwright-report:/home/pwuser/app/playwright-report" \
            -v "${{ github.workspace }}/pw-out/test-results:/home/pwuser/app/test-results" \
            -v "${{ github.workspace }}/pw-out/blob-report:/home/pwuser/app/blob-report" \
            -v "${{ github.workspace }}/pw-out/allure-results:/home/pwuser/app/allure-results" \
            -e CI=true \
            -e APP_ENV="${APP_ENV}" \
            -e BASE_URL="${BASE_URL}" \
            -e API_URL="${API_URL}" \
            -e ACCEPT_INVALID_CERTS="${ACCEPT_INVALID_CERTS}" \
            -e MONGO_URL="${MONGO_URL}" \
            -e MONGO_DB="${MONGO_DB}" \
            -e AZURE_TENANT_ID="${AZURE_TENANT_ID}" \
            -e AZURE_TESTS_CLIENT_ID="${AZURE_TESTS_CLIENT_ID}" \
            -e AZURE_TESTS_CLIENT_SECRET="${AZURE_TESTS_CLIENT_SECRET}" \
            -e AZURE_API_SCOPE="${AZURE_API_SCOPE}" \
            -e AZURE_AUTHORITY="${AZURE_AUTHORITY}" \
            -e CF_ACCESS_CLIENT_ID="${CF_ACCESS_CLIENT_ID}" \
            -e CF_ACCESS_CLIENT_SECRET="${CF_ACCESS_CLIENT_SECRET}" \
            -e PW_TEST_USER="${PW_TEST_USER}" \
            -e PW_TEST_PASSWORD="${PW_TEST_PASSWORD}" \
            -e OTEL_EXPORTER_OTLP_ENDPOINT="${OTEL_EXPORTER_OTLP_ENDPOINT}" \
            -e OTEL_EXPORTER_OTLP_HEADERS="${OTEL_EXPORTER_OTLP_HEADERS}" \
            "${RUNNER_IMAGE}" \
            "${args[@]}"
          echo "::endgroup::"

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: blob-report-${{ matrix.shard.name }}-shard-${{ matrix.shard.shard }}-docker
          path: pw-out/blob-report/
          retention-days: 1
          compression-level: 9
          if-no-files-found: ignore

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: traces-${{ matrix.shard.name }}-shard-${{ matrix.shard.shard }}-docker
          path: pw-out/test-results/**/*.zip
          retention-days: 7
          compression-level: 9
          if-no-files-found: ignore

      - name: Dump compose logs on failure
        if: failure()
        shell: bash
        run: |
          echo "::group::docker compose ps"
          docker compose ps --all || true
          echo "::endgroup::"
          echo "::group::docker compose logs (tail 500)"
          docker compose logs --no-color --tail=500 || true
          echo "::endgroup::"

      - name: Docker compose down
        if: always()
        shell: bash
        run: docker compose down -v --remove-orphans --rmi local || true

  report:
    name: Report + gate
    needs: [docker-test]
    if: always()
    uses: ./.github/workflows/playwright-report.yml
    with:
      test_repo: ${{ inputs.test_repo }}
      test_repo_ref: ${{ inputs.test_repo_ref }}
      node_version: ${{ inputs.node_version }}
      reporters: 'html,json,junit,github'
      upload_junit: true
      fail_on_flaky: ${{ inputs.fail_on_flaky }}
      publish_report: ${{ inputs.publish_report }}
      test_result: ${{ needs.docker-test.result }}

  pr-comment:
    name: PR comment
    runs-on: ubuntu-latest
    needs: [report]
    if: always() && github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      # Posts (or updates in place) a single PR comment per workflow using the
      # native GitHub REST API via actions/github-script. Idempotency comes
      # from a hidden HTML marker in the comment body.
      - name: Upsert PR comment
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        env:
          STATUS: ${{ needs.report.outputs.status }}
          FAILED: ${{ needs.report.outputs.failed_count }}
          FLAKY: ${{ needs.report.outputs.flaky_count }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REPORT_NAME: ${{ needs.report.outputs.report_artifact_name }}
          REPORT_URL: ${{ needs.report.outputs.report_url }}
        with:
          script: |
            const marker = '<!-- playwright-docker-report -->';
            const status = process.env.STATUS || 'unknown';
            const failed = process.env.FAILED || '0';
            const flaky = process.env.FLAKY || '0';
            const runUrl = process.env.RUN_URL || '';
            const reportName = process.env.REPORT_NAME || '';
            const reportUrl = process.env.REPORT_URL || '';
            const label = status === 'success' ? 'PASS' : 'FAIL';
            const reportLine = reportUrl
              ? `HTML report: ${reportUrl}`
              : `HTML report artifact: \`${reportName}\` (download from the run page)`;

            const body = [
              marker,
              `## Playwright Docker tests: ${label}`,
              '',
              '| Result | Failed | Flaky |',
              '|--------|-------:|------:|',
              `| \`${status}\` | ${failed} | ${flaky} |`,
              '',
              reportLine,
              `Workflow run: ${runUrl}`,
            ].join('\n');

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const existing = comments.find((c) => c.body && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
              core.notice(`Updated PR comment ${existing.id} on #${issue_number}`);
            } else {
              const { data: created } = await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
              core.notice(`Created PR comment ${created.id} on #${issue_number}`);
            }
