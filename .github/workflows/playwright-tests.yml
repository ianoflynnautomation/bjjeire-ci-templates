# Reusable workflow: Playwright test runner for already-available environments.
#
# Consumers call this with `uses: <org>/<test-repo>/.github/workflows/playwright-tests.yml@<ref>`.
# This workflow is intentionally provisioning-agnostic: callers provide URLs and
# an app profile, and this workflow handles matrix execution, report merging, and
# result gating.

name: Playwright Tests

on:
  workflow_call:
    inputs:
      app_env:
        description: 'Playwright app profile: local | staging | docker'
        type: string
        required: false
        default: 'local'
      base_url:
        description: 'BASE_URL for tests (public hostname). UI shards always use this — browsers need a public origin for the MSAL OAuth redirect flow.'
        type: string
        required: false
        default: ''
      api_base_url:
        description: 'Public API_URL. Used by UI shards and as a fallback for the API shard when internal_api_url is empty.'
        type: string
        required: false
        default: ''
      internal_api_url:
        description: >-
          In-cluster Service DNS URL for the API (e.g. http://bjj-api.pr-N.svc.cluster.local).
          When non-empty, the api shard uses this and skips the Cloudflare service-token
          headers (the edge isn't in the path). Istio still enforces the Entra JWT at the
          workload sidecar.
        type: string
        required: false
        default: ''

      test_tags:
        description: 'Playwright grep filter, e.g. "@smoke" or "@acceptance" (full suite).'
        type: string
        required: false
        default: '@acceptance'
      only_changed_ref:
        description: >-
          When set (e.g. "origin/main"), run only tests affected by test-repo changes
          since this git ref (`playwright test --only-changed`). Meaningful for
          test-repo PRs only — app-repo changes do not map to test-file diffs.
          Empty (default) runs everything selected by test_tags.
        type: string
        required: false
        default: ''
      fail_on_flaky:
        description: 'Fail the gate when any test passed only after retry (flake policy — see playwright-report.yml).'
        type: boolean
        required: false
        default: false
      publish_report:
        description: >-
          Publish the merged HTML report to the running repo's gh-pages branch.
          Requires Pages enabled from gh-pages and the caller granting contents: write.
        type: boolean
        required: false
        default: false
      shard_total:
        description: 'Number of parallel shards per project.'
        type: number
        required: false
        default: 6
      playwright_projects:
        description: 'JSON array of Playwright project names to run. Must match project names in playwright.ui.config.ts / playwright.api.config.ts.'
        type: string
        required: false
        default: '["api","chromium-desktop","firefox-desktop","webkit-desktop","chromium-wide","snapshots","a11y","mobile-iphone","mobile-galaxy"]'

      node_version:
        description: 'Node.js version for the merge job.'
        type: string
        required: false
        default: '22'
      playwright_image:
        description: 'Container image used for the test job. Must be publicly pullable and ship the browsers matching @playwright/test (pin the tag to the package version).'
        type: string
        required: false
        default: 'mcr.microsoft.com/playwright:v1.61.0-noble'

      test_repo:
        description: 'Owner/repo holding the test code. Empty = caller repo (self-call from this repo).'
        type: string
        required: false
        default: ''
      test_repo_ref:
        description: 'Git ref of the test repo to check out (tag, branch, or SHA).'
        type: string
        required: false
        default: 'main'
      runner_label:
        description: 'GitHub Actions runner label. Defaults to the in-cluster ARC scale set so test execution lands on the AKS spot fleet rather than GH-hosted runners.'
        type: string
        required: false
        default: 'gha-runner-scale-set'

    secrets:
      GHCR_TOKEN:
        required: false
      EPHEMERAL_MONGO_URL:
        required: false
      EPHEMERAL_MONGO_DB:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_TESTS_CLIENT_ID:
        required: false
      AZURE_TESTS_CLIENT_SECRET:
        required: false
      AZURE_API_SCOPE:
        required: false
      AZURE_AUTHORITY:
        required: false
      CF_ACCESS_CLIENT_ID:
        required: false
      CF_ACCESS_CLIENT_SECRET:
        required: false
      PW_TEST_USER:
        required: false
      PW_TEST_PASSWORD:
        required: false
      OTEL_EXPORTER_OTLP_ENDPOINT:
        required: false
      OTEL_EXPORTER_OTLP_HEADERS:
        required: false

    outputs:
      test_status:
        description: 'success | failure — aggregated result of the matrix test job.'
        value: ${{ jobs.report.outputs.status }}
      failed_count:
        description: 'Number of failed tests across all shards (0 on green).'
        value: ${{ jobs.report.outputs.failed_count }}
      report_artifact_name:
        description: 'Name of the merged HTML report artifact.'
        value: ${{ jobs.report.outputs.report_artifact_name }}
      report_url:
        description: 'Public URL of the published HTML report (empty unless publish_report).'
        value: ${{ jobs.report.outputs.report_url }}

jobs:
  setup:
    name: Plan matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      shard_matrix: ${{ steps.plan.outputs.shard_matrix }}
      project_matrix: ${{ steps.plan.outputs.project_matrix }}
    steps:
      - id: plan
        shell: bash
        env:
          SHARD_TOTAL: ${{ inputs.shard_total }}
          PROJECTS: ${{ inputs.playwright_projects }}
        run: |
          set -euo pipefail
          shards=$(seq 1 "${SHARD_TOTAL}" | jq -R -s -c 'split("\n")[:-1] | map(tonumber)')
          project_matrix=$(echo "${PROJECTS}" | jq -c 'map({
            name: .,
            config: (if . == "api" then "playwright.api.config.ts" else "playwright.ui.config.ts" end)
          })')

          echo "shard_matrix=${shards}" >> "$GITHUB_OUTPUT"
          echo "project_matrix=${project_matrix}" >> "$GITHUB_OUTPUT"
          shard_count=$(echo "${shards}" | jq 'length')
          project_count=$(echo "${project_matrix}" | jq 'length')
          echo "::notice title=Matrix planned::${project_count} project(s) x ${shard_count} shard(s)"

  test:
    name: Test ${{ matrix.project.name }} ${{ matrix.shard }}/${{ inputs.shard_total }}
    runs-on: ${{ inputs.runner_label }}
    needs: [setup]
    permissions:
      contents: read
      checks: write
      packages: read

    container:
      image: ${{ inputs.playwright_image }}
      options: --ipc=host

    strategy:
      fail-fast: false
      matrix:
        project: ${{ fromJson(needs.setup.outputs.project_matrix) }}
        shard: ${{ fromJson(needs.setup.outputs.shard_matrix) }}

    env:
      CI: 'true'
      APP_ENV: ${{ inputs.app_env }}
      BASE_URL: ${{ inputs.base_url }}
      API_URL: ${{ matrix.project.name == 'api' && inputs.internal_api_url != '' && inputs.internal_api_url || inputs.api_base_url }}
      MONGO_URL: ${{ secrets.EPHEMERAL_MONGO_URL }}
      MONGO_DB: ${{ secrets.EPHEMERAL_MONGO_DB }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_TESTS_CLIENT_ID: ${{ secrets.AZURE_TESTS_CLIENT_ID }}
      AZURE_TESTS_CLIENT_SECRET: ${{ secrets.AZURE_TESTS_CLIENT_SECRET }}
      AZURE_API_SCOPE: ${{ secrets.AZURE_API_SCOPE }}
      AZURE_AUTHORITY: ${{ secrets.AZURE_AUTHORITY }}
      CF_ACCESS_CLIENT_ID: ${{ matrix.project.name == 'api' && inputs.internal_api_url != '' && '' || secrets.CF_ACCESS_CLIENT_ID }}
      CF_ACCESS_CLIENT_SECRET: ${{ matrix.project.name == 'api' && inputs.internal_api_url != '' && '' || secrets.CF_ACCESS_CLIENT_SECRET }}
      PW_TEST_USER: ${{ secrets.PW_TEST_USER }}
      PW_TEST_PASSWORD: ${{ secrets.PW_TEST_PASSWORD }}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
      OTEL_EXPORTER_OTLP_HEADERS: ${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

    steps:
      - name: Checkout test repo
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          repository: ${{ inputs.test_repo }}
          ref: ${{ inputs.test_repo_ref }}
          persist-credentials: false
          # --only-changed needs history to diff against the base ref.
          fetch-depth: ${{ inputs.only_changed_ref == '' && 1 || 0 }}

      - name: Cache npm downloads
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        env:
          PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
        run: npm ci --ignore-scripts

      - name: Run Playwright tests
        shell: bash
        env:
          PROJECT_NAME: ${{ matrix.project.name }}
          PROJECT_CONFIG: ${{ matrix.project.config }}
          SHARD: ${{ matrix.shard }}
          SHARD_TOTAL: ${{ inputs.shard_total }}
          TEST_TAGS: ${{ inputs.test_tags }}
          ONLY_CHANGED_REF: ${{ inputs.only_changed_ref }}
        run: |
          set -eo pipefail
          path_kind="public"
          if [[ "${API_URL}" == http://*.svc.cluster.local* ]]; then
            path_kind="cluster-local (CF edge bypassed)"
          fi
          echo "::notice title=Shard::${PROJECT_NAME} ${SHARD}/${SHARD_TOTAL} (${PROJECT_CONFIG}) — API_URL ${path_kind}"
          args=(
            -c "${PROJECT_CONFIG}"
            --project="${PROJECT_NAME}"
            --shard="${SHARD}/${SHARD_TOTAL}"
          )
          if [ -n "${TEST_TAGS}" ]; then
            args+=(--grep="${TEST_TAGS}")
          fi
          if [ -n "${ONLY_CHANGED_REF}" ]; then
            args+=(--only-changed="${ONLY_CHANGED_REF}")
          fi
          echo "::group::playwright test"
          npx playwright test "${args[@]}"
          echo "::endgroup::"

      - name: Upload blob report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: blob-report-${{ matrix.project.name }}-shard-${{ matrix.shard }}
          path: blob-report/
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload traces
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: traces-${{ matrix.project.name }}-shard-${{ matrix.shard }}
          path: test-results/**/*.zip
          retention-days: 7
          if-no-files-found: ignore

  report:
    name: Report + gate
    needs: [test]
    if: always()
    uses: ./.github/workflows/playwright-report.yml
    with:
      test_repo: ${{ inputs.test_repo }}
      test_repo_ref: ${{ inputs.test_repo_ref }}
      node_version: ${{ inputs.node_version }}
      reporters: 'html,json'
      fail_on_flaky: ${{ inputs.fail_on_flaky }}
      publish_report: ${{ inputs.publish_report }}
      test_result: ${{ needs.test.result }}
