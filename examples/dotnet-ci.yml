# Example caller: .NET PR validation using the shared dotnet-build workflow.
# Copy into your repo as .github/workflows/ci-pr.yml and adjust paths.
name: CI PR Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dotnet:
    name: .NET Build & Test
    permissions:
      contents: read
    uses: ianoflynnautomation/bjjeire-ci-templates/.github/workflows/dotnet-build.yml@v1
    with:
      solution-path: MyApp.sln
      configuration: Release
      container-image: mcr.microsoft.com/dotnet/sdk:10.0
      run-format-check: true
      format-include: ./src/
      test-filter: "Category!=Ignore"
      test-projects: |
        tests/MyApp.Domain.UnitTests/MyApp.Domain.UnitTests.csproj
        tests/MyApp.Api.UnitTests/MyApp.Api.UnitTests.csproj
        tests/MyApp.Api.IntegrationTests/MyApp.Api.IntegrationTests.csproj
